<div class="container mt-4">

  <h2 class="mb-4">My Cart</h2>

  <div
    class="alert alert-info"
    *ngIf="!cart || !cart.items || cart.items.length === 0">
    Cart is empty.
  </div>

  <div class="card" *ngIf="cart && cart.items && cart.items.length > 0">

    <div class="card-body">

      <table class="table table-bordered table-striped">

        <thead>
          <tr>
            <th>Medicine</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Total</th>
            <th>Action</th>
          </tr>
        </thead>

        <tbody>

          <tr *ngFor="let item of cart.items">

            <td>{{ item.medicineName }}</td>

            <td>₹ {{ item.price }}</td>

            <td>{{ item.quantity }}</td>

            <td>₹ {{ item.totalPrice }}</td>

            <td>
              <button
                class="btn btn-danger btn-sm"
                (click)="removeItem(item.medicineId)">
                Remove
              </button>
            </td>

          </tr>

        </tbody>

      </table>

      <h4 class="text-success mt-3">
        Grand Total: ₹ {{ cart.grandTotal || 0 }}
      </h4>

      <a
        routerLink="/orders"
        class="btn btn-success mt-3">
        Proceed To Order
      </a>

    </div>

  </div>

</div>
