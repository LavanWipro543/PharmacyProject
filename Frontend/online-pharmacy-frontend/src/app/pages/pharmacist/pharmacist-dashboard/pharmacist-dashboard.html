<div class="container mt-4">

  <h2 class="mb-4">
    Pharmacist Dashboard
  </h2>

  <div class="row">

    <div class="col-md-4 mb-4">

      <div class="card bg-warning text-white dashboard-card">

        <div class="card-body text-center">

          <h5>Pending Prescriptions</h5>

          <h2>📄</h2>

        </div>

      </div>

    </div>

    <div class="col-md-4 mb-4">

      <div class="card bg-success text-white dashboard-card">

        <div class="card-body text-center">

          <h5>Approved Prescriptions</h5>

          <h2>✅</h2>

        </div>

      </div>

    </div>

    <div class="col-md-4 mb-4">

      <div class="card bg-danger text-white dashboard-card">

        <div class="card-body text-center">

          <h5>Rejected Prescriptions</h5>

          <h2>❌</h2>

        </div>

      </div>

    </div>

  </div>

  <div class="row">

    <div class="col-md-6 mb-4">

      <a
        routerLink="/prescription-management"
        class="text-decoration-none">

        <div class="card action-card">

          <div class="card-body text-center">

            <h1>📄</h1>

            <h4>Manage Prescriptions</h4>

            <p>
              Approve or Reject Customer Prescriptions
            </p>

          </div>

        </div>

      </a>

    </div>

    <div class="col-md-6 mb-4">

      <a
        routerLink="/orders"
        class="text-decoration-none">

        <div class="card action-card">

          <div class="card-body text-center">

            <h1>📦</h1>

            <h4>View Orders</h4>

            <p>
              Review Customer Orders
            </p>

          </div>

        </div>

      </a>

    </div>

  </div>

</div>
