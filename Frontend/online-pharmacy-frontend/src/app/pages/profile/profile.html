<div class="container mt-4">

  <div class="card">

    <div class="card-header bg-primary text-white">

      My Profile

    </div>

    <div class="card-body">

      <div class="mb-3">

        <label class="fw-bold">
          Name
        </label>

        <input
          class="form-control"
          [value]="user.name"
          readonly>

      </div>

      <div class="mb-3">

        <label class="fw-bold">
          Email
        </label>

        <input
          class="form-control"
          [value]="user.email"
          readonly>

      </div>

      <div class="mb-3">

        <label class="fw-bold">
          Role
        </label>

        <input
          class="form-control"
          [value]="user.role"
          readonly>

      </div>

    </div>

  </div>

</div>
