<div class="container mt-4">

  <div class="card mb-4">

    <div class="card-header bg-primary text-white">
      Upload Prescription
    </div>

    <div class="card-body">

      <div class="mb-3">
        <label class="form-label">Doctor Name</label>
        <input
          type="text"
          class="form-control"
          [(ngModel)]="prescriptionData.doctorName">
      </div>

      <div class="mb-3">
        <label class="form-label">Image URL</label>
        <input
          type="text"
          class="form-control"
          [(ngModel)]="prescriptionData.imageUrl">
      </div>

      <button
        class="btn btn-primary"
        (click)="uploadPrescription()">
        Upload Prescription
      </button>

    </div>

  </div>

  <div class="card">

    <div class="card-header">
      My Prescriptions
    </div>

    <div class="card-body">

      <table class="table table-bordered table-striped">

        <thead>

          <tr>
            <th>ID</th>
            <th>Doctor Name</th>
            <th>Image URL</th>
            <th>Status</th>
          </tr>

        </thead>

        <tbody>

          <tr *ngFor="let p of prescriptions">

            <td>{{ p.id }}</td>

            <td>{{ p.doctorName }}</td>

            <td>{{ p.imageUrl }}</td>

            <td>
              <span
                class="badge bg-warning"
                *ngIf="p.status === 'PENDING'">
                PENDING
              </span>

              <span
                class="badge bg-success"
                *ngIf="p.status === 'APPROVED'">
                APPROVED
              </span>

              <span
                class="badge bg-danger"
                *ngIf="p.status === 'REJECTED'">
                REJECTED
              </span>
            </td>

          </tr>

        </tbody>

      </table>

    </div>

  </div>

</div>
