<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-header bg-success text-white text-center">

                    <h3>Register</h3>

                </div>

                <div class="card-body">

                    <div class="mb-3">

                        <label>Name</label>

                        <input
                            class="form-control"
                            [(ngModel)]="registerData.name">

                    </div>

                    <div class="mb-3">

                        <label>Email</label>

                        <input
                            type="email"
                            class="form-control"
                            [(ngModel)]="registerData.email">

                    </div>

                    <div class="mb-3">

                        <label>Password</label>

                        <input
                            type="password"
                            class="form-control"
                            [(ngModel)]="registerData.password">

                    </div>

                    <div class="mb-3">

                        <label>Role</label>

                        <select
                            class="form-control"
                            [(ngModel)]="registerData.role">

                            <option value="CUSTOMER">
                                CUSTOMER
                            </option>

                            <option value="PHARMACIST">
                                PHARMACIST
                            </option>

                        </select>

                    </div>

                    <button
                        class="btn btn-success w-100"
                        (click)="register()">

                        Register

                    </button>

                </div>

            </div>

        </div>

    </div>

</div>
